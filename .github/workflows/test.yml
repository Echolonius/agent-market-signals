name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Node.js (for the JS↔Python parity test)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check site detector script parses
        run: node --check docs/boardcheck.js
      - name: Run tests (standard library only; Node drives the parity test)
        run: python -m unittest discover -s tests -v
