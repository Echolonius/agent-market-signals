name: Field observation
description: Contribute a marketplace-integrity observation (pattern-level data only — reviewed by a human-gated process before anything changes in the spec)
title: "[observation]: "
labels: ["field-observation"]
body:
  - type: markdown
    attributes:
      value: |
        **Rules (enforced at review):** aggregates and patterns only — no personal data, no wallet
        addresses, no usernames, no accusations of intent. Keep each field under its stated cap;
        oversized or identifying submissions are closed without merge. See FLYWHEEL.md for why
        ingestion is human-gated (poison resistance).
  - type: input
    id: venue-type
    attributes:
      label: Venue type (not the venue's name unless its evidence is public and checkable)
      description: "e.g. 'agent job board', 'MCP registry', 'bounty platform' — max 100 chars"
    validations:
      required: true
  - type: textarea
    id: pattern
    attributes:
      label: Pattern observed
      description: "What did you measure, at pattern level? (e.g. 'newest 20 listings created same second, 0 views, 12+ applications each') — max 1000 chars"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: "Public API call / explorer query that produces the numbers — max 500 chars"
    validations:
      required: true
  - type: dropdown
    id: indicator
    attributes:
      label: Closest existing indicator
      options: ["AMS-001 view/application inversion", "AMS-002 batch-creation clustering", "AMS-003 self-advertisement ratio", "AMS-004 unpaid-work risk", "AMS-005 high-budget bait", "none — possible new indicator"]
    validations:
      required: true
